<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices Management | PurchaseHub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#FDFBFC',
                            100: '#F9F6F8',
                            200: '#F0EAF0',
                            300: '#E2D5DF',
                            400: '#CCB6C7',
                            500: '#B08EAA',
                            600: '#875A7B',
                            700: '#714B67',
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-white text-slate-800 antialiased min-h-screen flex flex-col font-['Inter']">

    <div id="app-layout" class="flex flex-1 overflow-hidden h-screen">
        <erp-sidebar active-item="invoices"></erp-sidebar>
        
        <div class="flex-1 flex flex-col overflow-hidden">
            <erp-navbar page-title="Invoice Management"></erp-navbar>
            
            <main class="flex-1 overflow-y-auto p-8 relative" id="screen-container">
                <div class="space-y-6">
                    <erp-page-header title="Invoice Management" subtitle="Review generated corporate invoice ledgers and download PDF bills.">
                         <button onclick="triggerInvoiceModal()" id="btn-add-invoice" class="btn-primary text-sm font-semibold flex items-center shadow-sm">
                             <i class="fa-solid fa-file-invoice mr-2"></i> Generate Invoice
                         </button>
                    </erp-page-header>

                    <div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left" id="invoices-table">
                                <thead>
                                    <tr>
                                        <th class="py-3.5 px-6">Invoice Number</th>
                                        <th class="py-3.5 px-6">PO Number</th>
                                        <th class="py-3.5 px-6">Vendor Company</th>
                                        <th class="py-3.5 px-6">Subtotal (Rs.)</th>
                                        <th class="py-3.5 px-6">Tax (Rs.)</th>
                                        <th class="py-3.5 px-6">Grand Total (Rs.)</th>
                                        <th class="py-3.5 px-6">Date Issued</th>
                                        <th class="py-3.5 px-6 text-right">PDF</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-200 text-sm text-slate-700">
                                    <!-- Populated dynamically -->
                                </tbody>
                            </table>
                        </div>
                        <erp-pagination></erp-pagination>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- ================================= GLOBAL MODALS ================================= -->
    <erp-modal id="vendor-modal" title="Add Vendor Partner">
         <form id="vendor-form" class="p-6 space-y-4">
              <div class="grid grid-cols-2 gap-4">
                  <erp-form-input id="v-name" label="Company Name" required></erp-form-input>
                  <erp-form-input id="v-gst" label="GSTIN Number" placeholder="e.g. GST-XX1234" required></erp-form-input>
              </div>
              <div class="grid grid-cols-2 gap-4">
                  <div class="mb-3.5">
                      <label for="v-category" class="block text-xs font-semibold text-slate-650 uppercase mb-1">Category</label>
                      <select id="v-category" required class="w-full">
                          <option value="IT Hardware">IT Hardware</option>
                          <option value="IT Infrastructure">IT Infrastructure</option>
                          <option value="General Procurement">General Procurement</option>
                      </select>
                  </div>
                  <erp-form-input id="v-email" label="Email Address" type="email" required></erp-form-input>
              </div>
              <div class="grid grid-cols-2 gap-4">
                  <erp-form-input id="v-phone" label="Phone Number" placeholder="+91 99999 99999" required></erp-form-input>
                  <erp-form-input id="v-rating" label="Quality Rating (0-5)" type="number" step="0.1" min="0" max="5"></erp-form-input>
              </div>
              <div class="mb-3.5" id="v-rating-container">
                  <label for="v-address" class="block text-xs font-semibold text-slate-655 uppercase mb-1">Corporate Address</label>
                  <textarea id="v-address" required rows="2" class="w-full"></textarea>
              </div>
              <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100">
                  <button type="button" onclick="closeVendorModal()" class="btn-secondary">Cancel</button>
                  <button type="submit" class="btn-primary">Save Profile</button>
              </div>
         </form>
    </erp-modal>

    <!-- 2. CREATE/EDIT RFQ MODAL -->
    <erp-modal id="rfq-modal" title="Create Procurement RFQ" size="lg">
         <form id="rfq-form" class="p-6 space-y-4">
              <erp-form-input id="rfq-title" label="RFQ Title / Product Name" placeholder="e.g. 100 Wireless Keyboards" required></erp-form-input>
              <div class="grid grid-cols-2 gap-4">
                  <erp-form-input id="rfq-quantity" label="Quantity Needed" type="number" min="1" required></erp-form-input>
                  <erp-form-input id="rfq-deadline" label="Bidding Deadline" type="datetime-local" required></erp-form-input>
              </div>
              <div class="mb-3.5">
                  <label for="rfq-desc" class="block text-xs font-semibold text-slate-650 uppercase mb-1">Detailed Technical Specifications</label>
                  <textarea id="rfq-desc" required rows="3" placeholder="Provide specs, requirements, warranty, etc." class="w-full"></textarea>
              </div>
              <div class="grid grid-cols-2 gap-4">
                  <erp-form-input id="rfq-attachment" label="Attach Spec File (Mock)" placeholder="e.g. specs_sheet_v3.pdf"></erp-form-input>
                  <div class="mb-3.5">
                       <label for="rfq-status-select" class="block text-xs font-semibold text-slate-650 uppercase mb-1">Status (Override)</label>
                       <select id="rfq-status-select" class="w-full">
                            <option value="Draft">Draft</option>
                            <option value="Open">Open (Publish to vendors)</option>
                       </select>
                  </div>
              </div>
              <div>
                  <label class="mb-2">Assign Bidding Vendors</label>
                  <div class="border border-slate-200 rounded-lg p-3 max-h-32 overflow-y-auto space-y-2 text-slate-700" id="rfq-vendors-checklist">
                       <!-- Assigned vendors checklists -->
                  </div>
              </div>
              <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100">
                  <button type="button" onclick="closeRFQModal()" class="btn-secondary">Cancel</button>
                  <button type="submit" class="btn-primary">Save RFQ</button>
              </div>
         </form>
    </erp-modal>

    <!-- 3. SUBMIT QUOTATION MODAL -->
    <erp-modal id="quote-modal" title="Submit Quotation Bid" size="sm">
         <form id="quote-form" class="p-6 space-y-4">
              <input type="hidden" id="q-rfq-id">
              <erp-form-input id="q-price" label="Total Bid Price (Rs.)" type="number" min="1" placeholder="e.g. 45000" required></erp-form-input>
              <erp-form-input id="q-days" label="Delivery Lead Time (Days)" type="number" min="1" placeholder="e.g. 7" required></erp-form-input>
              <div class="mb-3.5">
                  <label for="q-notes" class="block text-xs font-semibold text-slate-655 uppercase mb-1">Proposal Notes / Remarks</label>
                  <textarea id="q-notes" rows="3" placeholder="Warranty, support details, specs matching notes..." class="w-full"></textarea>
              </div>
              <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100">
                  <button type="button" onclick="closeQuoteModal()" class="btn-secondary">Cancel</button>
                  <button type="submit" class="btn-primary">Submit Bid</button>
              </div>
         </form>
    </erp-modal>

    <!-- 4. SUBMIT APPROVAL REMARKS MODAL -->
    <erp-modal id="approval-modal" title="Approval Work Order Decision" size="sm">
         <form id="approval-form" class="p-6 space-y-4">
              <input type="hidden" id="app-rfq-id">
              <input type="hidden" id="app-decision-status">
              <div class="mb-3.5">
                  <label for="app-remarks" class="block text-xs font-semibold text-slate-655 uppercase mb-1">Review Remarks / Auditing Notes</label>
                  <textarea id="app-remarks" required rows="3" placeholder="Why is this order approved or rejected?" class="w-full"></textarea>
              </div>
              <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100">
                  <button type="button" onclick="closeApprovalModal()" class="btn-secondary">Cancel</button>
                  <button type="submit" id="btn-approval-submit" class="btn-primary">Submit Decision</button>
              </div>
         </form>
    </erp-modal>

    <!-- 5. GENERATE INVOICE MODAL -->
    <erp-modal id="invoice-modal" title="Generate ERP Invoice" size="sm">
         <form id="invoice-form" class="p-6 space-y-4">
              <div class="mb-3.5">
                  <label for="inv-po-select" class="block text-xs font-semibold text-slate-650 uppercase mb-1">Select Purchase Order (Accepted)</label>
                  <select id="inv-po-select" required class="w-full"></select>
              </div>
              <erp-form-input id="inv-tax-rate" label="Tax rate (%)" type="number" step="0.5" value="18.0" required></erp-form-input>
              <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100">
                  <button type="button" onclick="closeInvoiceModal()" class="btn-secondary">Cancel</button>
                  <button type="submit" class="btn-primary">Generate Invoice</button>
              </div>
         </form>
    </erp-modal>

    <!-- 6. AUDIT SYSTEM SENT EMAILS LOG MODAL -->
    <erp-modal id="emails-modal" title="System Outbox (Mock SMTP)" size="lg">
         <div class="flex overflow-hidden h-[400px]">
             <div class="w-64 border-r border-slate-200 overflow-y-auto divide-y divide-slate-150 shrink-0" id="emails-sidebar-list">
                 <!-- Populated dynamically -->
             </div>
             <div class="flex-1 bg-slate-50/50 p-6 overflow-y-auto flex flex-col" id="email-detail-pane">
                 <div class="text-center my-auto text-slate-400" id="email-placeholder">
                     <i class="fa-solid fa-inbox text-5xl mb-3 text-slate-350"></i>
                     <p class="text-xs">Select a mail notification from the sidebar to inspect its content.</p>
                 </div>
                 <div id="email-real-content" class="hidden space-y-4 flex-1 flex flex-col">
                     <div class="bg-white border border-slate-200 p-4 rounded-lg shadow-sm">
                         <div class="flex justify-between items-start">
                             <div>
                                 <span class="text-[10px] text-slate-400 font-bold uppercase block">Recipient</span>
                                 <span class="text-sm font-semibold text-slate-800" id="mail-to">-</span>
                             </div>
                             <span class="text-xs text-slate-400" id="mail-time">-</span>
                         </div>
                         <div class="mt-3">
                             <span class="text-[10px] text-slate-400 font-bold uppercase block">Subject</span>
                             <h4 class="text-sm font-bold text-slate-800" id="mail-subject">-</h4>
                         </div>
                     </div>
                     <div class="bg-white border border-slate-200 p-6 rounded-lg shadow-sm flex-1 font-mono text-xs text-slate-700 whitespace-pre-wrap leading-relaxed overflow-y-auto" id="mail-body">
                         <!-- Body text -->
                     </div>
                 </div>
             </div>
         </div>
    </erp-modal>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

    <script src="/components/sidebar.js"></script>
    <script src="/components/navbar.js"></script>
    <script src="/components/datatable.js"></script>
    <script src="/components/charts.js"></script>
    <script src="/assets/js/router.js"></script>
    <script src="/assets/js/app.js"></script>
</body>
</html>
