<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login | PurchaseHub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#FDFBFC',
                            100: '#F9F6F8',
                            200: '#F0EAF0',
                            300: '#E2D5DF',
                            400: '#CCB6C7',
                            500: '#B08EAA',
                            600: '#875A7B', // primary hover
                            700: '#714B67', // primary brand purple
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-slate-100 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4 font-['Inter']">

    <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden border border-slate-200 transition-all duration-300 transform scale-100 flex flex-col">
        <!-- Auth Header Banner -->
        <div class="bg-[#714B67] p-8 text-white relative">
            <div class="absolute top-4 right-4 text-white/10 text-5xl font-bold select-none">ERP</div>
            <h1 class="text-2xl font-bold tracking-tight">PurchaseHub</h1>
            <p class="text-sm text-purple-100 mt-1">Enterprise Procurement Module</p>
        </div>
        
        <!-- Login Form -->
        <div class="p-8 flex-1">
            <h2 class="text-xl font-semibold text-slate-800 mb-6">Account Login</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-650 uppercase mb-1">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" id="login-email" required class="pl-10 w-full rounded-lg border border-slate-200 py-2.5 text-sm focus:outline-none" placeholder="e.g. officer@purchasehub.com">
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-semibold text-slate-655 uppercase">Password</label>
                        <a href="/forgot-password" class="text-xs text-brand-700 hover:text-brand-600 hover:underline">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="login-password" required class="pl-10 w-full rounded-lg border border-slate-200 py-2.5 text-sm focus:outline-none" placeholder="••••••••">
                    </div>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="login-remember" class="h-4 w-4 rounded border-slate-300 text-brand-700 focus:ring-brand-500">
                    <label for="login-remember" class="ml-2 block text-sm text-slate-600">Remember my session</label>
                </div>
                <button type="submit" class="w-full btn-primary py-2.5 rounded-lg text-sm transition-colors shadow-sm font-semibold">
                    Sign In <i class="fa-solid fa-arrow-right ml-1"></i>
                </button>
            </form>
            
            <!-- Demo login quick-select buttons -->
            <div class="mt-6 pt-6 border-t border-slate-100">
                <span class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 text-center">Demo Quick Login</span>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="window.app.autofillLogin('officer@vendorbridge.com', 'officerpassword')" class="text-left bg-slate-50 hover:bg-brand-50 hover:text-brand-700 p-2 rounded-lg text-xs border border-slate-150 transition-colors">
                        <span class="font-bold block">Procurement Officer</span>
                        <span class="text-[10px] text-slate-450">officer@vendorbridge.com</span>
                    </button>
                    <button onclick="window.app.autofillLogin('manager@vendorbridge.com', 'managerpassword')" class="text-left bg-slate-50 hover:bg-brand-50 hover:text-brand-700 p-2 rounded-lg text-xs border border-slate-150 transition-colors">
                        <span class="font-bold block">Finance Manager</span>
                        <span class="text-[10px] text-slate-455">manager@vendorbridge.com</span>
                    </button>
                    <button onclick="window.app.autofillLogin('bids@dell.com', 'dellpassword')" class="text-left bg-slate-50 hover:bg-brand-50 hover:text-brand-700 p-2 rounded-lg text-xs border border-slate-150 transition-colors">
                        <span class="font-bold block">Vendor (Dell)</span>
                        <span class="text-[10px] text-slate-450">bids@dell.com</span>
                    </button>
                    <button onclick="window.app.autofillLogin('partners@hp.com', 'hppassword')" class="text-left bg-slate-50 hover:bg-brand-50 hover:text-brand-700 p-2 rounded-lg text-xs border border-slate-150 transition-colors">
                        <span class="font-bold block">Vendor (HP)</span>
                        <span class="text-[10px] text-slate-450">partners@hp.com</span>
                    </button>
                </div>
            </div>

            <div class="mt-4 text-center">
                <span class="text-sm text-slate-500">Need a partner account? </span>
                <a href="/signup" class="text-sm text-brand-700 hover:text-brand-600 font-semibold hover:underline">Sign Up Now</a>
            </div>
        </div>
    </div>

    <!-- TOAST ALERTS CONTAINER -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

    <script src="/assets/js/router.js"></script>
    <script src="/assets/js/app.js"></script>
</body>
</html>
