<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Partner Account | PurchaseHub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#FDFBFC',
                            100: '#F9F6F8',
                            200: '#F0EAF0',
                            300: '#E2D5DF',
                            400: '#CCB6C7',
                            500: '#B08EAA',
                            600: '#875A7B',
                            700: '#714B67',
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-slate-100 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4 font-['Inter']">

    <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden border border-slate-200 transition-all duration-300 transform scale-100 flex flex-col">
        <!-- Auth Header Banner -->
        <div class="bg-[#714B67] p-8 text-white relative">
            <div class="absolute top-4 right-4 text-white/10 text-5xl font-bold select-none">ERP</div>
            <h1 class="text-2xl font-bold tracking-tight">PurchaseHub</h1>
            <p class="text-sm text-purple-100 mt-1">Enterprise Procurement Module</p>
        </div>
        
        <!-- Signup Form -->
        <div class="p-8 flex-1">
            <h2 class="text-xl font-semibold text-slate-800 mb-6">Create Partner Account</h2>
            <form id="signup-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Full Name</label>
                    <input type="text" id="signup-name" required class="w-full rounded-lg border border-slate-200 py-2.5 text-sm focus:outline-none" placeholder="e.g. John Doe">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Email Address</label>
                    <input type="email" id="signup-email" required class="w-full rounded-lg border border-slate-200 py-2.5 text-sm focus:outline-none" placeholder="e.g. john@company.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Register As</label>
                    <select id="signup-role" required onchange="window.app.toggleCompanyField()" class="w-full rounded-lg border border-slate-200 py-2.5 text-sm focus:outline-none">
                        <option value="Vendor" selected>Vendor Partner</option>
                        <option value="Procurement Officer">Procurement Officer</option>
                        <option value="Manager">Finance Manager</option>
                        <option value="Admin">Administrator</option>
                    </select>
                </div>
                <div id="signup-company-container">
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Company Name</label>
                    <input type="text" id="signup-company" class="w-full rounded-lg border border-slate-200 py-2.5 text-sm focus:outline-none" placeholder="e.g. Lenovo Business Inc">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Password</label>
                    <input type="password" id="signup-password" required class="w-full rounded-lg border border-slate-200 py-2.5 text-sm focus:outline-none" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full btn-primary py-2.5 rounded-lg text-sm transition-colors shadow-sm font-semibold">
                    Create Account <i class="fa-solid fa-user-plus ml-1"></i>
                </button>
            </form>
            <div class="mt-4 text-center">
                <span class="text-sm text-slate-500">Already registered? </span>
                <a href="/login" class="text-sm text-brand-700 hover:text-brand-600 font-semibold hover:underline">Back to Login</a>
            </div>
        </div>
    </div>

    <!-- TOAST ALERTS CONTAINER -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

    <script src="/assets/js/router.js"></script>
    <script src="/assets/js/app.js"></script>
</body>
</html>
