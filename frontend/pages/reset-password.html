<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | PurchaseHub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#FDFBFC',
                            100: '#F9F6F8',
                            200: '#F0EAF0',
                            300: '#E2D5DF',
                            400: '#CCB6C7',
                            500: '#B08EAA',
                            600: '#875A7B',
                            700: '#714B67',
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-slate-100 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4 font-['Inter']">

    <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden border border-slate-200 transition-all duration-300 transform scale-100 flex flex-col">
        <!-- Auth Header Banner -->
        <div class="bg-[#714B67] p-8 text-white relative">
            <div class="absolute top-4 right-4 text-white/10 text-5xl font-bold select-none">ERP</div>
            <h1 class="text-2xl font-bold tracking-tight">PurchaseHub</h1>
            <p class="text-sm text-purple-100 mt-1">Enterprise Password Reset</p>
        </div>
        
        <!-- Reset Password Form -->
        <div class="p-8 flex-1" id="reset-pane">
            <h2 class="text-xl font-semibold text-slate-800 mb-4">Set New Password</h2>
            <p class="text-xs text-slate-500 mb-6">Please choose a secure new password for your account.</p>
            
            <form id="reset-password-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-650 uppercase mb-1">New Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="new-password" required minlength="6" class="pl-10 w-full rounded-lg border border-slate-200 py-2.5 text-sm focus:outline-none" placeholder="••••••••">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-655 uppercase mb-1">Confirm New Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="confirm-password" required minlength="6" class="pl-10 w-full rounded-lg border border-slate-200 py-2.5 text-sm focus:outline-none" placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" class="w-full btn-primary py-2.5 rounded-lg text-sm transition-colors shadow-sm font-semibold">
                    Reset Password <i class="fa-solid fa-key ml-1"></i>
                </button>
            </form>
            <div class="mt-6 text-center">
                <a href="/login" class="text-sm text-brand-700 hover:text-brand-600 font-semibold hover:underline">Back to Login</a>
            </div>
        </div>
        
        <div class="p-8 flex-1 text-center hidden" id="error-pane">
            <div class="w-16 h-16 bg-red-100 text-red-650 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-800">Invalid Link</h3>
            <p class="text-xs text-slate-500 mt-2" id="error-message">This password reset link is invalid, expired, or missing parameters.</p>
            <div class="mt-6">
                <a href="/forgot-password" class="btn-primary inline-block text-xs font-semibold px-6 py-2.5 rounded-lg shadow-sm">Request New Link</a>
            </div>
        </div>
    </div>

    <!-- TOAST ALERTS CONTAINER -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

    <script>
        // Inline Helper for showing alerts (to stay isolated from app.js router conflicts)
        function showLocalToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `flex items-center p-4 w-72 rounded-xl border shadow-lg transition-all text-xs font-semibold `;
            let icon = '';
            if (type === 'success') {
                toast.className += 'bg-emerald-50 text-emerald-800 border-emerald-200';
                icon = '<i class="fa-solid fa-circle-check text-emerald-500 mr-2 text-base"></i>';
            } else {
                toast.className += 'bg-red-50 text-red-800 border-red-200';
                icon = '<i class="fa-solid fa-circle-xmark text-red-500 mr-2 text-base"></i>';
            }
            toast.innerHTML = `<div class="flex items-start">${icon}<div class="flex-1">${message}</div></div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const token = urlParams.get('token');

            if (!email || !token) {
                document.getElementById('reset-pane').classList.add('hidden');
                document.getElementById('error-pane').classList.remove('hidden');
                document.getElementById('error-message').textContent = 'The password reset link is missing the email or validation token.';
                return;
            }

            document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('new-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (newPassword !== confirmPassword) {
                    showLocalToast('Passwords do not match.', 'error');
                    return;
                }

                try {
                    const response = await fetch('/api/auth/reset-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email,
                            token: token,
                            new_password: newPassword
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.detail || 'Failed to reset password.');
                    }

                    showLocalToast('Password reset successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);

                } catch (err) {
                    showLocalToast(err.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
